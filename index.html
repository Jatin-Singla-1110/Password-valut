<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProVault // Zero-Knowledge Password Manager</title>
    <style>
        :root {
            --bg-main: #0a0f1d;
            --bg-card: #131c31;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 2rem; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid #232d45; padding-bottom: 1rem; }
        h1 { font-size: 1.8rem; letter-spacing: -0.5px; }
        h1 span { color: var(--accent); }

        .auth-panel, .vault-panel { background: var(--bg-card); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #1e293b; }
        .hidden { display: none !important; }

        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        input { width: 100%; padding: 0.75rem; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; font-size: 1rem; transition: all 0.2s; }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        
        button { background: var(--accent); color: white; border: none; padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 600; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: var(--accent-hover); }
        button.btn-danger { background: var(--danger); }
        button.btn-secondary { background: #334155; }
        button.btn-secondary:hover { background: #475569; }

        .vault-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; margin-top: 1.5rem; }
        .entry-list { display: flex; flex-direction: column; gap: 0.75rem; max-height: 500px; overflow-y: auto; }
        .entry-card { background: #1e293b; padding: 1rem; border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
        .entry-card:hover, .entry-card.active { border-color: var(--accent); background: #24334d; }
        .entry-card h4 { font-size: 1.1rem; margin-bottom: 0.25rem; }
        .entry-card p { color: var(--text-muted); font-size: 0.85rem; }

        .display-panel { background: #1e293b; padding: 2rem; border-radius: 8px; display: flex; flex-direction: column; justify-content: space-between; }
        .secret-field { background: #0f172a; padding: 1rem; border-radius: 6px; position: relative; margin-top: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { background: transparent; font-size: 0.85rem; color: var(--accent); padding: 0.25rem 0.5rem; }
        .copy-btn:hover { background: rgba(59,130,246,0.1); }

        .actions { display: flex; gap: 1rem; margin-top: 2rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Pro<span>Vault</span>.io</h1>
        <div id="session-info" class="hidden">
            <button class="btn-secondary" onclick="lockVault()">Lock Vault</button>
        </div>
    </header>

    <div id="auth-panel" class="auth-panel">
        <h2>Unlock Your Vault</h2>
        <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">Enter your Master Password. Encryption/Decryption happens strictly client-side.</p>
        <div class="form-group">
            <label for="master-password">Master Password</label>
            <input type="password" id="master-password" placeholder="••••••••••••••••">
        </div>
        <button onclick="initializeVault()">Unlock / Create Vault</button>
    </div>

    <div id="vault-panel" class="vault-panel hidden">
        <div class="vault-layout">
            <div>
                <h3>Add New Credential</h3>
                <form id="vault-form" onsubmit="saveEntry(event)" style="margin-top: 1rem; margin-bottom: 2rem;">
                    <div class="form-group"><label>Service Name</label><input type="text" id="service" required placeholder="GitHub, Bank, etc."></div>
                    <div class="form-group"><label>Username/Email</label><input type="text" id="username" required></div>
                    <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
                    <button type="submit" style="width: 100%;">Secure & Save</button>
                </form>

                <h3>Stored Keys</h3>
                <div id="entry-list" class="entry-list" style="margin-top: 1rem;"></div>
            </div>

            <div id="display-panel" class="display-panel">
                <div id="viewer-placeholder">
                    <p style="color: var(--text-muted); text-align: center;">Select an entry to securely decrypt and view credentials.</p>
                </div>
                <div id="viewer-content" class="hidden">
                    <h2 id="view-service" style="color: var(--accent);">Service</h2>
                    <div class="secret-field">
                        <div>
                            <span style="font-size: 0.8rem; color: var(--text-muted); display:block;">USERNAME</span>
                            <span id="view-username" style="font-weight: bold;">-</span>
                        </div>
                        <button class="copy-btn" onclick="copyText('view-username')">Copy</button>
                    </div>
                    <div class="secret-field">
                        <div>
                            <span style="font-size: 0.8rem; color: var(--text-muted); display:block;">PASSWORD</span>
                            <span id="view-password" style="font-family: monospace; letter-spacing: 1px;">••••••••</span>
                        </div>
                        <button class="copy-btn" onclick="togglePasswordVisibility()">Reveal</button>
                        <button class="copy-btn" onclick="copyText('view-password', true)">Copy</button>
                    </div>
                    <div class="actions">
                        <button class="btn-danger" id="delete-btn">Delete Entry</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Global State management
    let derivedKey = null; 
    let vaultEntries = []; 
    let selectedEntryId = null;
    let currentlyRevealedPassword = "";

    // Helper functions for ArrayBuffer / Base64 conversions (Required for Web Crypto API)
    const arrayBufferToBase64 = (buffer) => btoa(String.fromCharCode(...new Uint8Array(buffer)));
    const base64ToArrayBuffer = (base64) => Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;

    // 1. Key Derivation Function (PBKDF2)
    async function deriveKeyFromPassword(password) {
        const encoder = new TextEncoder();
        const passwordBuffer = encoder.encode(password);
        
        // Static salt used for demonstration. In a multi-user cloud app, salt should be unique per user.
        const salt = encoder.encode("ProVault_Static_Salt_System_2026"); 

        const baseKey = await crypto.subtle.importKey(
            "raw", passwordBuffer, "PBKDF2", false, ["deriveKey"]
        );

        return await crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
            baseKey,
            { name: "AES-GCM", length: 256 },
            false,
            ["encrypt", "decrypt"]
        );
    }

    // 2. Encryption (AES-GCM 256)
    async function encryptData(plainText, key) {
        const encoder = new TextEncoder();
        const iv = crypto.getRandomValues(new Uint8Array(12)); // Unique IV per item
        const encrypted = await crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv },
            key,
            encoder.encode(plainText)
        );
        return {
            cipherText: arrayBufferToBase64(encrypted),
            iv: arrayBufferToBase64(iv)
        };
    }

    // 3. Decryption (AES-GCM 256)
    async function decryptData(cipherTextBase64, ivBase64, key) {
        try {
            const decrypted = await crypto.subtle.decrypt(
                { name: "AES-GCM", iv: base64ToArrayBuffer(ivBase64) },
                key,
                base64ToArrayBuffer(cipherTextBase64)
            );
            return new TextDecoder().decode(decrypted);
        } catch (e) {
            alert("Decryption failed. Invalid Master Key or corrupted payload.");
            return null;
        }
    }

    // App Navigation & Lifecycle
    async function initializeVault() {
        const passwordInput = document.getElementById('master-password').value;
        if (!passwordInput) return alert("Please enter a Master Password");

        derivedKey = await deriveKeyFromPassword(passwordInput);
        
        // Hide auth, show vault UI
        document.getElementById('auth-panel').classList.add('hidden');
        document.getElementById('vault-panel').classList.remove('hidden');
        document.getElementById('session-info').classList.remove('hidden');
        
        loadVaultFromStorage();
    }

    function lockVault() {
        derivedKey = null;
        vaultEntries = [];
        selectedEntryId = null;
        document.getElementById('master-password').value = "";
        document.getElementById('auth-panel').classList.remove('hidden');
        document.getElementById('vault-panel').classList.add('hidden');
        document.getElementById('session-info').classList.add('hidden');
    }

    // Storage Management
    function loadVaultFromStorage() {
        const rawData = localStorage.getItem('provault_encrypted_db');
        vaultEntries = rawData ? JSON.parse(rawData) : [];
        renderEntryList();
    }

    async function saveEntry(e) {
        e.preventDefault();
        const service = document.getElementById('service').value;
        const username = document.getElementById('username').value;
        const secret = document.getElementById('password').value;

        // Encrypt data chunks individually
        const encryptedUser = await encryptData(username, derivedKey);
        const encryptedPass = await encryptData(secret, derivedKey);

        const newEntry = {
            id: Date.now().toString(),
            service: service, // Service metadata remains plaintext for indexing/searching
            uCipher: encryptedUser.cipherText,
            uIv: encryptedUser.iv,
            pCipher: encryptedPass.cipherText,
            pIv: encryptedPass.iv
        };

        vaultEntries.push(newEntry);
        localStorage.setItem('provault_encrypted_db', JSON.stringify(vaultEntries));
        
        document.getElementById('vault-form').reset();
        renderEntryList();
    }

    function renderEntryList() {
        const listContainer = document.getElementById('entry-list');
        listContainer.innerHTML = "";

        if(vaultEntries.length === 0) {
            listContainer.innerHTML = `<p style="color:var(--text-muted); font-size:0.9rem;">No credentials saved yet.</p>`;
            return;
        }

        vaultEntries.forEach(entry => {
            const card = document.createElement('div');
            card.className = `entry-card ${selectedEntryId === entry.id ? 'active' : ''}`;
            card.onclick = () => viewEntry(entry.id);
            card.innerHTML = `<h4>${entry.service}</h4><p>ID: ****</p>`;
            listContainer.appendChild(card);
        });
    }

    async function viewEntry(id) {
        selectedEntryId = id;
        renderEntryList(); // Update selected styles
        
        const entry = vaultEntries.find(e => e.id === id);
        if(!entry) return;

        // Decrypt active elements on-demand
        const user = await decryptData(entry.uCipher, entry.uIv, derivedKey);
        currentlyRevealedPassword = await decryptData(entry.pCipher, entry.pIv, derivedKey);

        document.getElementById('viewer-placeholder').classList.add('hidden');
        const content = document.getElementById('viewer-content');
        content.classList.remove('hidden');

        document.getElementById('view-service').innerText = entry.service;
        document.getElementById('view-username').innerText = user;
        document.getElementById('view-password').innerText = "••••••••"; // Keep hidden initially
        
        document.getElementById('delete-btn').onclick = () => deleteEntry(id);
    }

    function togglePasswordVisibility() {
        const field = document.getElementById('view-password');
        if (field.innerText === "••••••••") {
            field.innerText = currentlyRevealedPassword;
        } else {
            field.innerText = "••••••••";
        }
    }

    function deleteEntry(id) {
        if(confirm("Are you sure you want to delete this secure entry?")) {
            vaultEntries = vaultEntries.filter(e => e.id !== id);
            localStorage.setItem('provault_encrypted_db', JSON.stringify(vaultEntries));
            
            document.getElementById('viewer-placeholder').classList.remove('hidden');
            document.getElementById('viewer-content').classList.add('hidden');
            selectedEntryId = null;
            renderEntryList();
        }
    }

    function copyText(elementId, isPassword = false) {
        let textToCopy = "";
        if(isPassword) {
            textToCopy = currentlyRevealedPassword;
        } else {
            textToCopy = document.getElementById(elementId).innerText;
        }
        
        navigator.clipboard.writeText(textToCopy);
        alert("Copied to clipboard safely!");
    }
</script>
</body>
</html>
